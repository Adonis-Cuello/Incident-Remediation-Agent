version: "3.9"

networks:
  sre-net:
    driver: bridge

services:

  web-service:
    build: ./services/web_service
    container_name: web-service
    networks: [sre-net]
    ports:
      - "8001:8000"
    environment:
      - FAILURE_MODE=none
    restart: "no"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks: [sre-net]
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: "no"

  worker:
    build: ./services/worker
    container_name: worker
    networks: [sre-net]
    environment:
      - REDIS_URL=redis://redis:6379
      - FAILURE_MODE=none
    depends_on: [redis]
    restart: "no"

  agent:
    build: ./agent
    container_name: sre-agent
    networks: [sre-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./audit:/app/audit
      - ./policy.yaml:/app/policy.yaml:ro
      - ./.env:/app/.env:ro
    ports:
      - "8080:8080"
      - "8090:8090"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on: [web-service, redis, worker]
    restart: unless-stopped
